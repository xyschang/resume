<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張元碩 - QR Code</title>
    <style>
        body {
            font-family: Arial, 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2c5282);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .qr-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        img {
            max-width: 280px;
            border: 8px solid #1e3a8a;
            border-radius: 12px;
        }
        p {
            margin-top: 25px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <h1>張元碩 - 線上簡歷</h1>
    
    <div class="qr-container">
        <!-- 請把你的 QR Code 圖片改名成 qr-code.png 並放在同一個資料夾 -->
        <img src="qr-code.jpeg" alt="掃描 QR Code 查看我的簡歷">
    </div>
    
    <p>掃描上方 QR Code 即可快速查看我的完整線上簡歷<br>
       或直接點擊連結：<br>
       <a href="https://xyschang.github.io/resume" style="color:#ffd700;">https://xyschang.github.io/resume</a>
    </p>
</body>
</html>
